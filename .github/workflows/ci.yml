name: CI

on:
  push:
  pull_request:

jobs:
  cpu-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure CPU-only build
        run: cmake -S . -B build -DCUDABENCH_ENABLE_CUDA=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Run benchmark smoke path
        run: ./build/cuda_bench matmul 8 1
